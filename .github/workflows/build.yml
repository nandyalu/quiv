name: Build

on:
  push:
    paths:
      - "quiv/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "quiv/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build
