name: Type Check

on:
  push:
    paths:
      - "quiv/**"
  pull_request:
    paths:
      - "quiv/**"
  workflow_dispatch:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run mypy
        run: uv run mypy quiv
